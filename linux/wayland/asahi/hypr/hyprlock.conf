# sample hyprlock.conf
# for more configuration options, refer https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock
#
# rendered text in all widgets supports pango markup (e.g. <b> or <i> tags)
# ref. https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock/#general-remarks
#
# shortcuts to clear password buffer: ESC, Ctrl+U, Ctrl+Backspace
#
# you can get started by copying this config to ~/.config/hypr/hyprlock.conf
#

$font = Inter Medium
$fontbold = Inter SemiBold

general {
    hide_cursor = false
}

# uncomment to enable fingerprint authentication
# auth {
#     fingerprint {
#         enabled = true
#         ready_message = Scan fingerprint to unlock
#         present_message = Scanning...
#         retry_delay = 250 # in milliseconds
#     }
# }

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 5, linear
    animation = fadeOut, 1, 5, linear
    animation = inputFieldDots, 1, 2, linear
}

background {
    monitor =
    # path = screenshot
    path = ~/.config/backgrounds/tree-cold-mountain-art.jpg
    blur_passes = 1
}

input-field {
    monitor =
    size = 300, 40
    outline_thickness = 0
    inner_color = rgba(242, 243, 244, 0)

    outer_color = rgba(242, 243, 244, 0)
    check_color = rgba(204, 136, 34, 0)
    fail_color = rgba(255, 255, 255, 0.8)

    font_color = rgba(0, 0, 0, 1)
    fade_on_empty = false
    # rounding = 15

    font_family = $font
    placeholder_text = Input password...
    fail_text = $PAMFAIL$FPRINTFAIL

    check_text = Authenticating...

    # uncomment to use a letter instead of a dot to indicate the typed password
    # dots_text_format = *
    dots_size = 0.2
    dots_spacing = 0.55
    dots_center = true
    dots_rounding = -1

    # uncomment to use an input indicator that does not show the password length (similar to swaylock's input indicator)
    hide_input = false
    capslock_color = -1
    numlock_color = -1
    bothlock_color = -1
    invert_numlock = false
    swap_font_color = false

    position = 0, -600
    halign = center
    valign = center
}

# DATE
label {
    monitor =
    # text = cmd[update:60000] date +"%A, %d %B %Y" # update every 60 seconds
    text = cmd[update:1000] echo "$(date +"%A, %B %d")"
    color = rgba(242, 243, 244, 0.75)
    font_size = 35
    font_family = $font
    position = 0, 600
    halign = center
    valign = center
}

# TIME
label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%l:%M" | sed 's/ //')"
    # text = $TIME # ref. https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock/#variable-substitution
    color = rgba(242, 243, 244, 0.75)
    font_size = 150
    font_family = $fontbold
    position = 0, 470
    halign = center
    valign = center
}


# Username
label {
monitor =
  text = $USER
  color = rgba(242, 243, 244, 0.75)
  font_size = 20
  font_family = $fontbold
  position = 0, -557
  halign = center
  valign = center
}

# Password hint
label {
  monitor =
  text = Enter Your Password
  color = rgba(242, 243, 244, 0.75)
  font_size = 15
  font_family = $font 
  position = 0, -650
  halign = center
  valign = center
}
